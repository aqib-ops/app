<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Aqib Mehmood</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 15%, #2a4ed4 0%, #05080a 45%, #020406 100%);
        font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f3f8ff;
        padding: 24px;
      }

      .card {
        width: min(680px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 22px;
        background: rgba(5, 8, 10, 0.8);
        padding: 32px 28px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(14px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 4rem);
        line-height: 0.92;
      }

      p {
        margin: 14px 0 0;
        font-size: 1.02rem;
        color: rgba(238, 246, 255, 0.78);
      }

      a {
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 12px 18px;
        text-decoration: none;
        background: #00e4c2;
        color: #051012;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404</h1>
      <p>The page you requested does not exist or the link has changed.</p>
      <p>Return to homepage and continue from there.</p>
      <a href="/">Back to Home</a>
    </main>
  </body>
</html>
